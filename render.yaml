services:
  - type: web
    name: adaptifai-backend
    runtime: docker
    rootDir: backend
    plan: standard
    healthCheckPath: /health
    disk:
      name: adaptifai-model-cache
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-4o
      - key: ADAPTIFAI_TROCR_MODEL
        value: microsoft/trocr-base-printed
      - key: ADAPTIFAI_OCR_ENGINE
        value: easyocr
      - key: ADAPTIFAI_INPAINT_MODEL
        value: runwayml/stable-diffusion-inpainting
      - key: ADAPTIFAI_INPAINT_BACKEND
        value: opencv
      - key: ADAPTIFAI_INPAINT_MAX_SIDE
        value: "384"
      - key: ADAPTIFAI_INPAINT_STEPS
        value: "12"
      - key: ADAPTIFAI_OCR_MAX_SIDE
        value: "1280"
      - key: ADAPTIFAI_OCR_BATCH_SIZE
        value: "1"
      - key: ADAPTIFAI_EASYOCR_DECODER
        value: greedy
      - key: ADAPTIFAI_RESIZE_FIT
        value: cover
      - key: ADAPTIFAI_CORS_ORIGINS
        value: https://adaptifai.sasmaz.digital,https://adaptifai-five.vercel.app
      - key: HF_HOME
        value: /data/huggingface
      - key: TORCH_HOME
        value: /data/torch
      - key: EASYOCR_MODULE_PATH
        value: /data/easyocr
      - key: ADAPTIFAI_TMP_DIR
        value: /data/tmp/adaptifai
